<!-- templates/registration/password_reset.html -->
{% block content %}
  <h2>Forgot your password?</h2>
  <p>Enter your email address below, and we'll send you instructions to reset your password.</p>
  
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Submit</button>
  </form>
{% endblock %}
