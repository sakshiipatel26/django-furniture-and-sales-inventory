{% extends 'store/base.html' %}
{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-body">
                    <h3 class="card-title mb-4">Request Exchange for Order #{{ order.id }}</h3>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="{{ form.new_product.id_for_label }}" class="form-label">Select New Product</label>
                            {{ form.new_product }}
                        </div>
                        <div class="mb-3">
                            <label for="{{ form.reason.id_for_label }}" class="form-label">Reason for Exchange</label>
                            {{ form.reason }}
                        </div>
                        <button type="submit" class="btn btn-primary">Submit Exchange Request</button>
                        <a href="{% url 'track_order' order.id %}" class="btn btn-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
