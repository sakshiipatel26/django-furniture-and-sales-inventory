{% extends 'store/base.html' %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Exchange Form</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"> <!-- Bootstrap CSS -->
</head>
<body>
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-body">
                        <h3 class="card-title mb-4">Exchange Request for Order #{{ order.id }}</h3>
                        <form method="POST">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label">Select New Product</label>
                                <select id="product-select" class="form-control" name="new_product" required>
                                    <option value="">---------</option>
                                    {% for product in form.fields.new_product.queryset %}
                                        <option value="{{ product.id }}" data-image="{{ product.image.url }}" data-price="{{ product.price }}" data-description="{{ product.description }}">
                                            {{ product.name }}
                                        </option>
                                    {% endfor %}
                                </select>
                                
                                <!-- Image Preview Below Dropdown -->
                                <img id="product-image-preview" src="" style="width: 100%; height: 100px; width: 100px; margin-top: 10px; display: none;">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Product Description</label>
                                <p id="product-description" class="border p-2" ></p>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Product Price</label>
                                <p id="product-price" class="border p-2" style="display: none;"></p>
                            </div>

                            <div class="mb-3">
                                <label class="form-label d-block">Reason for Exchange</label>  <!-- Added `d-block` to force new line -->
                                {{ form.reason }}
                                <script>
                                    document.addEventListener("DOMContentLoaded", function () {
                                        let textarea = document.querySelector("textarea");
                                        textarea.style.height = "120px";
                                        textarea.style.width = "100%"; // Adjust width to full container
                                    });
                                </script>
                                {% if form.reason.errors %}
                                    <div class="text-danger">
                                        {{ form.reason.errors }}
                                    </div>
                                {% endif %}
                            </div>
                            
                            <button type="submit" class="btn btn-primary">Submit Exchange Request</button>
                            <a href="{% url 'track_order' order.id %}" class="btn btn-secondary">Cancel</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const productSelect = document.getElementById("product-select");
            const imagePreview = document.getElementById("product-image-preview");
            const productDescription = document.getElementById("product-description");
            const productPrice = document.getElementById("product-price");

            productSelect.addEventListener("change", function() {
                const selectedOption = productSelect.options[productSelect.selectedIndex];
                const imageUrl = selectedOption.getAttribute("data-image");
                const price = selectedOption.getAttribute("data-price");
                const description = selectedOption.getAttribute("data-description");

                if (imageUrl) {
                    imagePreview.src = imageUrl;
                    imagePreview.style.display = "block";
                } else {
                    imagePreview.style.display = "none";
                }

                if (description) {
                    productDescription.innerHTML = description;
                    productDescription.style.display = "block";
                } else {
                    productDescription.style.display = "none";
                }

                if (price) {
                    productPrice.innerHTML = price;
                    productPrice.style.display = "block";
                } else {
                    productPrice.style.display = "none";
                }
            });
        });
    </script>
</body>
</html>
{% endblock %}
