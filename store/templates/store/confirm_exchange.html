{% extends 'store/base.html' %}

{% block style %}
<style>
    /* Full viewport centering with a smooth gradient background */
    .exchange-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #f0f4f8, #d9e2ec);
        padding: 20px;
        font-family: 'Poppins', sans-serif;
    }

    /* Exchange card styling with a modern look */
    .exchange-card {
        background: white;
        padding: 50px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        max-width: 500px;
        text-align: center;
        animation: fadeIn 0.6s ease-in-out;
        border: 1px solid rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(10px);
    }

    /* Heading with a gradient text effect */
    .exchange-card h1 {
        background: linear-gradient(90deg, #28a745, #218838);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-size: 32px;
        font-weight: 700;
        margin-bottom: 20px;
    }

    /* Paragraph with a softer color */
    .exchange-card p {
        font-size: 18px;
        color: #666;
        line-height: 1.6;
        margin-bottom: 20px;
    }

    /* Styled button with a hover effect */
    .exchange-btn {
        display: inline-block;
        margin-top: 25px;
        padding: 14px 35px;
        font-size: 18px;
        font-weight: 600;
        border: none;
        border-radius: 50px;
        background: linear-gradient(90deg, #007bff, #0056b3);
        color: white;
        cursor: pointer;
        transition: all 0.3s ease-in-out;
        box-shadow: 0 5px 15px rgba(0, 123, 255, 0.3);
        text-decoration: none;
        position: relative;
        overflow: hidden;
    }

    /* Button hover effect with a glowing animation */
    .exchange-btn:hover {
        background: linear-gradient(90deg, #0056b3, #004080);
        transform: translateY(-3px);
        box-shadow: 0 8px 20px rgba(0, 123, 255, 0.5);
    }

    /* Button ripple effect */
    .exchange-btn::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 300%;
        height: 300%;
        background: rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        transform: translate(-50%, -50%) scale(0);
        transition: transform 0.5s ease;
    }

    .exchange-btn:active::after {
        transform: translate(-50%, -50%) scale(1);
        opacity: 0;
    }

    /* Fade-in animation for the card */
    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(-20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Subtle background animation */
    .exchange-container::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 10%, transparent 10.01%);
        background-size: 20px 20px;
        animation: moveBackground 10s linear infinite;
    }

    @keyframes moveBackground {
        from {
            transform: translateY(0);
        }
        to {
            transform: translateY(20px);
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="exchange-container">
    <div class="exchange-card">
        <h1>Exchange Successful! 🔄</h1>
        <p>Your exchange request has been processed successfully.</p>
        <p>The new product will be delivered at the time of pickup.</p>
        <a href="{% url 'home' %}" class="exchange-btn">Go to Home</a>
    </div>
</div>
{% endblock %}
