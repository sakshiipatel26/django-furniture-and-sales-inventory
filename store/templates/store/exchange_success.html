{% extends 'store/base.html' %}

{% block style %}
<style>
    /* Full viewport centering */
    .exchange-container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100vw;
        background: linear-gradient(135deg, #f8f9fa, #dfe4ea);
        padding: 20px;
    }

    /* Exchange card styling */
    .exchange-card {
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        max-width: 500px;
        text-align: center;
        animation: fadeIn 0.5s ease-in-out;
    }

    /* Heading */
    .exchange-card h1 {
        color: #e67e22;
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 10px;
    }

    /* Form */
    .exchange-form {
        margin-top: 20px;
    }

    .exchange-form select {
        width: 100%;
        padding: 10px;
        font-size: 16px;
        border: 1px solid #ccc;
        border-radius: 5px;
        margin-bottom: 15px;
    }

    /* Submit button */
    .exchange-btn {
        padding: 12px 30px;
        font-size: 17px;
        font-weight: 500;
        border: none;
        border-radius: 50px;
        background: linear-gradient(90deg, #f39c12, #d35400);
        color: white;
        cursor: pointer;
        transition: all 0.3s ease-in-out;
        box-shadow: 0 4px 10px rgba(243, 156, 18, 0.3);
        text-decoration: none;
    }

    .exchange-btn:hover {
        background: linear-gradient(90deg, #d35400, #b03a00);
        transform: scale(1.05);
        box-shadow: 0 6px 15px rgba(243, 156, 18, 0.5);
    }

    /* Fade-in animation */
    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(-10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="exchange-container">
    <div class="exchange-card">
        <h1>Exchange Your Product 🔄</h1>
        <p>Select a new product to exchange for your current order.</p>

        <form class="exchange-form" method="POST">
            {% csrf_token %}
            <select name="new_product" required>
                <option value="" disabled selected>Select a product</option>
                {% for product in products %}
                <option value="{{ product.id }}">{{ product.name }} - ₹{{ product.price }}</option>
                {% endfor %}
            </select>
            <button><a href="{% url 'confirm_exchange' %}" class="exchange-btn">Confirm Exchange</a></button>

        </form>
    </div>
</div>
{% endblock %}
